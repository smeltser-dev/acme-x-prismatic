<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Acme FSM — Fleet Operations Console</title>
<meta name="description" content="Acme FSM: field-service operations for the trades. Live fleet telematics, work orders, and a natively embedded integration marketplace + workflow builder powered by Prismatic." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#eef2f6; --surface:#ffffff; --surface-2:#f8fafc; --surface-3:#f1f5f9;
    --ink:#0d1b26; --ink-2:#41576b; --ink-3:#7589a0; --ink-4:#9fb0c2;
    --line:#e2e9f0; --line-2:#eef3f7;
    --teal:#0e98a4; --teal-deep:#0a6f78; --teal-tint:#e3f5f6; --teal-bright:#2fd0db;
    --amber:#d97726; --amber-tint:#fbf0e3; --amber-ink:#9a5316;
    --green:#1c9a68; --green-tint:#e7f6ee;
    --red:#d2483f; --red-tint:#fbe9e7;
    --blue:#2f6df0;
    --sidebar-1:#0c1923; --sidebar-2:#0a141d;
    --sb-ink:#c7d6e2; --sb-muted:#637c8f; --sb-line:#1b2c39;
    --shadow-sm:0 1px 2px rgba(13,27,38,.06), 0 1px 1px rgba(13,27,38,.04);
    --shadow-md:0 4px 16px rgba(13,27,38,.08), 0 1px 3px rgba(13,27,38,.05);
    --shadow-lg:0 18px 50px -12px rgba(13,27,38,.22);
    --r:12px; --r-sm:9px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--canvas); color:var(--ink);
    font-family:"IBM Plex Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-size:14px; line-height:1.55; -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--teal-bright); color:#04231f}
  .mono{font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace; font-feature-settings:"tnum"}
  .cond{font-family:"IBM Plex Sans Condensed","IBM Plex Sans",sans-serif}
  button{font-family:inherit; cursor:pointer}
  a{color:var(--teal-deep); text-decoration:none}

  /* ---------- App shell ---------- */
  .app{display:grid; grid-template-columns:248px 1fr; min-height:100vh}

  /* ---------- Sidebar ---------- */
  .sidebar{
    background:linear-gradient(185deg,var(--sidebar-1),var(--sidebar-2));
    color:var(--sb-ink); display:flex; flex-direction:column;
    border-right:1px solid #06101a; position:sticky; top:0; height:100vh;
  }
  .brand{display:flex; align-items:center; gap:11px; padding:20px 20px 18px}
  .brand .logo{width:34px; height:34px; flex:0 0 34px}
  .brand .name{display:flex; flex-direction:column; line-height:1.1}
  .brand .name b{font-weight:700; font-size:16px; letter-spacing:.2px; color:#fff}
  .brand .name span{font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--sb-muted); font-weight:600; margin-top:2px}

  .workspace{margin:0 14px 8px; padding:9px 11px; border:1px solid var(--sb-line);
    border-radius:var(--r-sm); display:flex; align-items:center; gap:9px; background:rgba(255,255,255,.02)}
  .workspace .ws-ico{width:26px;height:26px;border-radius:7px;background:var(--teal-deep);
    display:grid;place-items:center;font-weight:700;color:#d6fbff;font-size:13px;flex:0 0 26px}
  .workspace .ws-meta{min-width:0}
  .workspace .ws-meta b{display:block;font-size:12.5px;color:#eaf2f8;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .workspace .ws-meta span{font-size:10.5px;color:var(--sb-muted)}

  nav.side{padding:10px 12px; flex:1; overflow-y:auto}
  nav.side .grp{font-family:"IBM Plex Sans Condensed",sans-serif; font-size:10.5px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--sb-muted); font-weight:600; padding:14px 11px 6px}
  nav.side a{
    display:flex; align-items:center; gap:11px; padding:8.5px 11px; border-radius:var(--r-sm);
    color:var(--sb-ink); font-size:13.5px; font-weight:500; position:relative; margin:1px 0;
    transition:background .14s, color .14s;
  }
  nav.side a:hover{background:rgba(255,255,255,.045); color:#fff}
  nav.side a.active{background:rgba(46,208,219,.12); color:#fff}
  nav.side a.active::before{content:""; position:absolute; left:-12px; top:8px; bottom:8px; width:3px;
    border-radius:0 3px 3px 0; background:var(--teal-bright)}
  nav.side a svg{width:18px; height:18px; flex:0 0 18px; opacity:.82}
  nav.side a.active svg{opacity:1}
  nav.side a .badge{margin-left:auto; font-size:10.5px; font-weight:700; padding:1px 7px; border-radius:999px;
    background:var(--amber); color:#2a1605; font-family:"IBM Plex Mono",monospace}
  nav.side a .badge.teal{background:var(--teal-bright); color:#04231f}

  .side-foot{padding:13px 18px; border-top:1px solid var(--sb-line); font-size:11px; color:var(--sb-muted)}
  .side-foot .pp{display:flex; align-items:center; gap:7px}
  .side-foot .pp b{color:#aebfcd; font-weight:600}
  .side-foot .ver{margin-top:6px; opacity:.6; font-family:"IBM Plex Mono",monospace; font-size:10px}

  /* ---------- Topbar ---------- */
  .main{min-width:0; display:flex; flex-direction:column}
  .topbar{
    height:60px; background:rgba(255,255,255,.86); backdrop-filter:saturate(1.4) blur(10px);
    border-bottom:1px solid var(--line); display:flex; align-items:center; gap:16px;
    padding:0 26px; position:sticky; top:0; z-index:20;
  }
  .topbar .crumb{font-size:13px; color:var(--ink-3); display:flex; align-items:center; gap:8px}
  .topbar .crumb b{color:var(--ink); font-weight:600; font-size:14px}
  .topbar .spacer{flex:1}
  .conn{display:inline-flex; align-items:center; gap:8px; font-size:12.5px; color:var(--ink-2);
    background:var(--surface-3); border:1px solid var(--line); padding:6px 11px; border-radius:999px; font-weight:500}
  .conn .dot{width:8px;height:8px;border-radius:50%; background:var(--ink-4); transition:.2s}
  .conn .dot.live{background:var(--green); box-shadow:0 0 0 3px rgba(28,154,104,.18)}
  .conn .dot.err{background:var(--amber); box-shadow:0 0 0 3px rgba(217,119,38,.18)}
  .conn .dot.live{animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(28,154,104,.18)}50%{box-shadow:0 0 0 5px rgba(28,154,104,.05)}}
  .who{display:flex; align-items:center; gap:9px; padding-left:4px}
  .who .av{width:32px;height:32px;border-radius:50%; background:linear-gradient(135deg,var(--teal),var(--teal-deep));
    color:#eafdff; display:grid; place-items:center; font-weight:700; font-size:13px}
  .who .wm{line-height:1.15}
  .who .wm b{display:block; font-size:12.5px; font-weight:600}
  .who .wm span{font-size:11px; color:var(--ink-3)}

  /* ---------- Content ---------- */
  .content{padding:26px 30px 60px; max-width:1320px; width:100%; margin:0 auto}
  .view{display:none; animation:rise .4s cubic-bezier(.16,.84,.44,1)}
  .view.active{display:block}
  @keyframes rise{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}

  .ph{display:flex; align-items:flex-end; justify-content:space-between; gap:18px; margin-bottom:22px; flex-wrap:wrap}
  .ph h1{font-size:25px; font-weight:700; letter-spacing:-.4px; margin:0 0 3px}
  .ph p{margin:0; color:var(--ink-3); font-size:13.5px; max-width:62ch}
  .ph .eyebrow{font-family:"IBM Plex Sans Condensed",sans-serif; font-size:11px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--teal-deep); font-weight:600; margin-bottom:7px}

  .btn{display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line); background:var(--surface);
    color:var(--ink); padding:8px 14px; border-radius:var(--r-sm); font-size:13px; font-weight:600;
    box-shadow:var(--shadow-sm); transition:.14s}
  .btn:hover{border-color:var(--ink-4); transform:translateY(-1px)}
  .btn.primary{background:var(--teal-deep); border-color:var(--teal-deep); color:#eafdff}
  .btn.primary:hover{background:#085058}
  .btn svg{width:15px;height:15px}
  .btn.sm{padding:5.5px 10px; font-size:12px}

  /* KPI cards */
  .kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px}
  .kpi{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:16px 17px;
    box-shadow:var(--shadow-sm); position:relative; overflow:hidden}
  .kpi .kl{font-family:"IBM Plex Sans Condensed",sans-serif; font-size:11.5px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--ink-3); font-weight:600; display:flex; align-items:center; gap:7px}
  .kpi .kl svg{width:15px;height:15px}
  .kpi .kv{font-size:32px; font-weight:700; letter-spacing:-1px; margin-top:9px; line-height:1; font-family:"IBM Plex Sans",sans-serif}
  .kpi .kv small{font-size:14px; color:var(--ink-3); font-weight:500; letter-spacing:0}
  .kpi .ks{font-size:12px; color:var(--ink-3); margin-top:6px}
  .kpi .ks .up{color:var(--green); font-weight:600}
  .kpi.alert{background:linear-gradient(180deg,#fffaf3,var(--amber-tint)); border-color:#f1d9bf}
  .kpi.alert .kl{color:var(--amber-ink)} .kpi.alert .kv{color:var(--amber-ink)}
  .kpi.alert::after{content:""; position:absolute; right:-20px; top:-20px; width:80px;height:80px; border-radius:50%; background:rgba(217,119,38,.08)}

  /* Layout grids */
  .cols{display:grid; grid-template-columns:1.55fr 1fr; gap:18px; align-items:start}
  .panel{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow-sm); overflow:hidden}
  .panel > .pt{display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:14px 18px; border-bottom:1px solid var(--line-2)}
  .panel > .pt h3{margin:0; font-size:14.5px; font-weight:600; display:flex; align-items:center; gap:9px}
  .panel > .pt .ct{font-size:11.5px; color:var(--ink-3); font-weight:500}
  .panel > .pt h3 .ico{width:20px;height:20px;border-radius:6px;display:grid;place-items:center;flex:0 0 20px}
  .panel .pb{padding:6px 0}

  /* Service alert rows */
  .alertrow{display:flex; gap:13px; padding:13px 18px; border-bottom:1px solid var(--line-2); align-items:flex-start}
  .alertrow:last-child{border-bottom:0}
  .alertrow .vbadge{width:42px;height:42px;border-radius:9px; flex:0 0 42px; display:grid;place-items:center;
    background:var(--amber-tint); color:var(--amber-ink); font-weight:700; border:1px solid #f0d6ba}
  .alertrow .vbadge svg{width:21px;height:21px}
  .alertrow .ar-main{flex:1; min-width:0}
  .alertrow .ar-main .t{font-weight:600; font-size:13.5px}
  .alertrow .ar-main .t .vid{font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--ink-3); font-weight:500; margin-left:7px}
  .alertrow .reasons{display:flex; flex-wrap:wrap; gap:6px; margin-top:7px}
  .chip{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; padding:2.5px 8px; border-radius:6px;
    background:var(--surface-3); color:var(--ink-2); border:1px solid var(--line)}
  .chip.amber{background:var(--amber-tint); color:var(--amber-ink); border-color:#efd6ba}
  .chip.red{background:var(--red-tint); color:#a8362f; border-color:#f2cdc9}
  .chip.green{background:var(--green-tint); color:#15724e; border-color:#c8e8d6}
  .chip.teal{background:var(--teal-tint); color:var(--teal-deep); border-color:#bfe6e8}
  .chip .mono{font-size:11px}
  .alertrow .ar-act{align-self:center}

  /* Activity feed */
  .feed{padding:6px 0}
  .feeditem{display:flex; gap:12px; padding:11px 18px; position:relative}
  .feeditem .fdot{width:30px;height:30px;border-radius:8px;flex:0 0 30px;display:grid;place-items:center;
    background:var(--teal-tint); color:var(--teal-deep)}
  .feeditem .fdot svg{width:16px;height:16px}
  .feeditem .fdot.green{background:var(--green-tint);color:var(--green)}
  .feeditem .fbody{flex:1; min-width:0; font-size:13px}
  .feeditem .fbody b{font-weight:600}
  .feeditem .ftime{font-size:11px; color:var(--ink-4); margin-top:2px; font-family:"IBM Plex Mono",monospace}
  .feeditem::before{content:""; position:absolute; left:32.5px; top:41px; bottom:-3px; width:2px; background:var(--line-2)}
  .feeditem:last-child::before{display:none}

  /* Mini connected systems */
  .sys{display:flex; align-items:center; gap:11px; padding:10px 18px; border-bottom:1px solid var(--line-2)}
  .sys:last-child{border-bottom:0}
  .sys .glyph{width:30px;height:30px;border-radius:7px;flex:0 0 30px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px;font-family:"IBM Plex Sans Condensed",sans-serif}
  .sys .sm{flex:1}
  .sys .sm b{font-size:13px;font-weight:600;display:block}
  .sys .sm span{font-size:11.5px;color:var(--ink-3)}

  /* Tables */
  .tablewrap{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow-sm); overflow:hidden}
  table{width:100%; border-collapse:collapse}
  thead th{font-family:"IBM Plex Sans Condensed",sans-serif; text-align:left; font-size:11px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--ink-3); font-weight:600; padding:12px 16px; border-bottom:1px solid var(--line);
    background:var(--surface-2); white-space:nowrap}
  tbody td{padding:13px 16px; border-bottom:1px solid var(--line-2); font-size:13px; vertical-align:middle}
  tbody tr{transition:background .12s}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr:last-child td{border-bottom:0}
  td .vname{font-weight:600}
  td .vid{font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--ink-3)}
  .statuspill{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; padding:3px 9px; border-radius:999px}
  .statuspill .d{width:6px;height:6px;border-radius:50%}
  .statuspill.active{background:var(--green-tint); color:#15724e} .statuspill.active .d{background:var(--green)}
  .statuspill.due{background:var(--amber-tint); color:var(--amber-ink)} .statuspill.due .d{background:var(--amber)}
  .statuspill.open{background:var(--teal-tint); color:var(--teal-deep)} .statuspill.open .d{background:var(--teal)}
  .statuspill.closed{background:var(--surface-3); color:var(--ink-3)} .statuspill.closed .d{background:var(--ink-4)}
  .statuspill.high{background:var(--red-tint); color:#a8362f} .statuspill.high .d{background:var(--red)}

  /* service progress */
  .svc{min-width:140px}
  .svc .track{height:6px; border-radius:6px; background:var(--surface-3); overflow:hidden; margin-top:5px}
  .svc .fill{height:100%; border-radius:6px; transition:width 1s cubic-bezier(.16,.84,.44,1)}
  .svc .lab{font-size:11px; color:var(--ink-3); font-family:"IBM Plex Mono",monospace}

  /* Integration cards */
  .intgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:14px}
  .intcard{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:17px;
    box-shadow:var(--shadow-sm); display:flex; flex-direction:column; gap:12px; transition:.16s}
  .intcard:hover{box-shadow:var(--shadow-md); transform:translateY(-2px); border-color:#d2dde7}
  .intcard .ic-top{display:flex; align-items:center; gap:12px}
  .intcard .glyph{width:42px;height:42px;border-radius:10px;flex:0 0 42px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:17px;font-family:"IBM Plex Sans Condensed",sans-serif}
  .intcard .ic-meta b{font-size:14.5px;font-weight:600;display:block}
  .intcard .ic-meta span{font-size:11.5px;color:var(--ink-3)}
  .intcard .ic-desc{font-size:12.5px; color:var(--ink-2); line-height:1.5; flex:1}
  .intcard .ic-foot{display:flex; align-items:center; justify-content:space-between; gap:8px}
  .src{font-size:10.5px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; font-family:"IBM Plex Sans Condensed",sans-serif; color:var(--ink-4)}

  /* Embed frame */
  .embedwrap{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow-md); overflow:hidden; margin-top:6px}
  .embedwrap .eb-bar{display:flex; align-items:center; gap:11px; padding:12px 18px; border-bottom:1px solid var(--line-2); background:var(--surface-2)}
  .embedwrap .eb-bar .dotrow{display:flex; gap:6px}
  .embedwrap .eb-bar .dotrow i{width:9px;height:9px;border-radius:50%;background:var(--line); display:block}
  .embedwrap .eb-bar .eb-url{font-family:"IBM Plex Mono",monospace; font-size:11.5px; color:var(--ink-3);
    background:var(--surface); border:1px solid var(--line); border-radius:7px; padding:4px 12px; flex:1; display:flex; align-items:center; gap:8px}
  .embedwrap .eb-bar .eb-url svg{width:12px;height:12px;color:var(--green)}
  .embedwrap .eb-tag{font-size:10.5px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
    color:var(--teal-deep); background:var(--teal-tint); border:1px solid #bfe6e8; padding:3px 9px; border-radius:6px; font-family:"IBM Plex Sans Condensed",sans-serif}
  .embedstage{position:relative; min-height:72vh}
  .embedstage > div{width:100%; min-height:72vh}
  /* The embedded SDK injects an <iframe> into the container; make it fill, not collapse to its default height. */
  .embedstage iframe{width:100%; height:72vh; min-height:72vh; border:0; display:block}
  .eoverlay{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:var(--surface);
    z-index:2; text-align:center; padding:24px}
  .eoverlay.hide{display:none}
  .spinner{width:38px;height:38px;border-radius:50%;border:3px solid var(--teal-tint);border-top-color:var(--teal);
    animation:spin .8s linear infinite; margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .eoverlay h3{margin:0 0 5px;font-size:15px} .eoverlay p{margin:0;color:var(--ink-3);font-size:13px;max-width:420px}
  .eoverlay .retry{margin-top:14px;padding:8px 16px;border-radius:8px;font-weight:600;font-size:13px;background:var(--teal-deep);color:#eafdff;border:0}

  .note{font-size:12.5px; color:var(--ink-3); margin-top:11px; display:flex; gap:9px; align-items:flex-start; line-height:1.5}
  .note svg{width:16px;height:16px;flex:0 0 16px;margin-top:1px;color:var(--teal)}

  .sectlabel{font-family:"IBM Plex Sans Condensed",sans-serif; font-size:12px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink-3); font-weight:600; margin:24px 0 12px; display:flex; align-items:center; gap:10px}
  .sectlabel::after{content:""; flex:1; height:1px; background:var(--line)}

  /* customers */
  .custgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  .custcard{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:17px; box-shadow:var(--shadow-sm)}
  .custcard .cc-top{display:flex; align-items:center; gap:12px; margin-bottom:13px}
  .custcard .cc-logo{width:40px;height:40px;border-radius:10px;flex:0 0 40px;display:grid;place-items:center;color:#fff;font-weight:700;font-family:"IBM Plex Sans Condensed",sans-serif}
  .custcard .cc-top b{font-size:14.5px;display:block}
  .custcard .cc-top span{font-size:11.5px;color:var(--ink-3)}
  .custcard .cc-stats{display:flex; gap:18px; padding-top:13px; border-top:1px solid var(--line-2)}
  .custcard .cc-stats div b{font-size:18px;font-weight:700;display:block}
  .custcard .cc-stats div span{font-size:11px;color:var(--ink-3);font-family:"IBM Plex Sans Condensed",sans-serif;text-transform:uppercase;letter-spacing:.06em}

  /* settings / generic prose card */
  .prose{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow-sm); padding:24px 26px; max-width:760px}
  .prose h3{margin:0 0 4px; font-size:16px} .prose .row{display:flex; justify-content:space-between; gap:16px; padding:13px 0; border-bottom:1px solid var(--line-2)}
  .prose .row:last-child{border-bottom:0}
  .prose .row .k{color:var(--ink-3); font-size:13px} .prose .row .v{font-weight:600; font-size:13px; text-align:right}
  .prose .v .mono{font-size:12.5px}

  @media(max-width:1080px){.kpis{grid-template-columns:repeat(2,1fr)}.cols{grid-template-columns:1fr}.intgrid,.custgrid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:760px){.app{grid-template-columns:1fr}.sidebar{display:none}.intgrid,.custgrid,.kpis{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="brand">
      <svg class="logo" viewBox="0 0 40 40" fill="none" aria-hidden="true">

  <div class="intgrid">

    <div class="embedstage">
      <div class="eoverlay" id="ov-wf"><div id="ovc-wf"><div class="spinner"></div><h3>Loading the builder…</h3><p>Authenticating Acme Corp with Prismatic.</p></div></div>

function viewSettings(){
  return `
  <div class="ph"><div><div class="eyebrow">Workspace</div><h1>Settings</h1>
  <p>This is a live demonstration build — a real Acme-style product running the actual Prismatic embedded SDK on real telematics data.</p></div></div>
  <div class="prose">
    <h3>Demo workspace</h3>
    <div class="row"><span class="k">Workspace</span><span class="v">Acme Corp <span class="mono" style="color:var(--ink-3)">[Demo]</span></span></div>
    <div class="row"><span class="k">Telematics source</span><span class="v"><span class="mono">my-json-server · /vehicles</span></span></div>

const VIEWS = {
  dashboard:{title:"Dashboard", render:viewDashboard},
  fleet:{title:"Fleet", render:viewFleet},
  workorders:{title:"Work Orders", render:viewWorkOrders},
  customers:{title:"Customers", render:viewCustomers},
  integrations:{title:"Integrations", render:viewIntegrations},
  automations:{title:"Automations", render:viewAutomations},
  settings:{title:"Settings", render:viewSettings},
};

/* =================== ROUTER =================== */
const content = document.getElementById("content");
const crumb = document.getElementById("crumb");
let current = null;

function go(route){
  if(!VIEWS[route]) route = "dashboard";
  current = route;
  crumb.textContent = VIEWS[route].title;
  document.querySelectorAll("#nav a").forEach(a=>a.classList.toggle("active", a.dataset.route===route));
  content.innerHTML = `<section class="view active">${VIEWS[route].render()}</section>`;
  // animate service bars in
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    content.querySelectorAll(".svc .fill").forEach(f=>{ f.style.background=f.dataset.col; f.style.width=f.dataset.w; });
  }));
  if(route==="integrations") mountMarketplace();
  if(route==="automations")  mountWorkflows();
  if(history.state?.r!==route) history.replaceState({r:route}, "", "#"+route);
}

// delegate every [data-route] click (nav + in-page buttons)
document.addEventListener("click", e=>{
  const el = e.target.closest("[data-route]");
  if(!el) return;
  e.preventDefault();
  go(el.dataset.route);
  document.querySelector(".content").scrollIntoView({block:"start"});
});
window.addEventListener("hashchange", ()=>go(location.hash.replace("#","")||"dashboard"));

/* =================== PRISMATIC EMBED =================== */
const ACME_INIT = {
  prismaticUrl: PRISMATIC_URL,
  theme: "LIGHT",
  fontConfiguration: { google: { families: ["IBM Plex Sans"] } },
  screenConfiguration: { initializing: { background: "#ffffff", color: "#0e98a4" } },
};

let authReady = false, authError = false, expiresAtMs = null, reAuthTimer = null;
const mounted = { mkt:false, wf:false };

function setConn(state, text){
  const d = document.getElementById("connDot"), t = document.getElementById("connText");
  if(d) d.className = "dot" + (state==="live"?" live":state==="err"?" err":"");
  if(t) t.textContent = text;
}

async function fetchAndAuthenticate(){
  try{
    const res = await fetch(TOKEN_URL);
    if(!res.ok) throw new Error("Token service returned "+res.status);
    const { token, expiresAt } = await res.json();
    if(!token) throw new Error("Empty token from service.");
    await prismatic.authenticate({ token });
    authReady = true; authError = false; expiresAtMs = typeof expiresAt==="number"?expiresAt:null;
    setConn("live", "Connected · Acme Corp [Demo]");
    clearEmbedOverlays();
    if(current==="integrations") mountMarketplace();
    if(current==="automations")  mountWorkflows();
    if(reAuthTimer) clearTimeout(reAuthTimer);
    if(expiresAtMs){
      let delay = expiresAtMs - Date.now() - 60_000;
      if(!Number.isFinite(delay) || delay < 5_000) delay = 5_000;
      reAuthTimer = setTimeout(fetchAndAuthenticate, delay);
    }
  }catch(err){
    console.error("Prismatic auth failed:", err);
    authError = true;
    setConn("err", "Connection issue");
    showEmbedError((err&&err.message)||"Could not reach the token service.");
  }
}

function clearEmbedOverlays(){
  ["ov-mkt","ov-wf"].forEach(id=>{ const o=document.getElementById(id); if(o && (id==="ov-mkt"&&mounted.mkt || id==="ov-wf"&&mounted.wf)) o.classList.add("hide"); });
}
function showEmbedError(msg){
  [["ovc-mkt","ov-mkt"],["ovc-wf","ov-wf"]].forEach(([cid,oid])=>{
    const c=document.getElementById(cid), o=document.getElementById(oid);
    if(c&&o){ o.classList.remove("hide");
      c.innerHTML = `<div style="font-size:30px;margin-bottom:8px">⚠️</div><h3>Couldn't load this</h3><p>${msg}</p><button class="retry" onclick="window.__retry()">Try again</button>`;
    }
  });
}
window.__retry = ()=>{ ["ovc-mkt","ovc-wf"].forEach(id=>{const c=document.getElementById(id); if(c) c.innerHTML='<div class="spinner"></div><h3>Reconnecting…</h3><p>Authenticating with Prismatic.</p>';}); setConn("","Connecting…"); fetchAndAuthenticate(); };

function mountMarketplace(){
  const host = document.getElementById("acme-marketplace");
  if(!host) return;
  if(!authReady){ if(authError) showEmbedError("Could not reach the token service."); return; }
  if(mounted.mkt){ const o=document.getElementById("ov-mkt"); if(o)o.classList.add("hide"); return; }
  mounted.mkt = true;
  prismatic.showMarketplace({ selector:"#acme-marketplace", usePopover:false, theme:"LIGHT",
    screenConfiguration:{ initializing:{ background:"#ffffff", color:"#0e98a4" } } });
  const o=document.getElementById("ov-mkt"); if(o) o.classList.add("hide");
}
function mountWorkflows(){
  const host = document.getElementById("acme-workflows");
  if(!host) return;
  if(!authReady){ if(authError) showEmbedError("Could not reach the token service."); return; }
  if(mounted.wf){ const o=document.getElementById("ov-wf"); if(o)o.classList.add("hide"); return; }
  mounted.wf = true;
  prismatic.showWorkflows({ selector:"#acme-workflows", usePopover:false, theme:"LIGHT",
    screenConfiguration:{ initializing:{ background:"#ffffff", color:"#0e98a4" } } });
  const o=document.getElementById("ov-wf"); if(o) o.classList.add("hide");
}

/* =================== BOOT =================== */
(async function boot(){
  // pull live telematics so the product shows true numbers; fall back gracefully
  try{
    const r = await fetch(MOCK + "/vehicles");
    if(r.ok){ const d = await r.json(); if(Array.isArray(d) && d.length) VEHICLES = d; }
  }catch(_){ /* keep fallback */ }

  go(location.hash.replace("#","") || "dashboard");

  prismatic.init(ACME_INIT);
  setConn("", "Connecting…");
  fetchAndAuthenticate();
})();
</script>
